<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real-Time Chat</title>
    <style>
      /* --- General & Reset --- */
      :root {
        --background-primary: #1e1e1e;
        --background-secondary: #2a2a2a;
        --text-primary: #e0e0e0;
        --text-secondary: #888888;
        --border-color: #444444;
        --primary-color: #ff9900;
        --primary-text: #111111;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
        margin: 0;
        background-color: var(--background-primary);
        color: var(--text-primary);
      }

      #messages {
        flex-grow: 1;
        overflow-y: auto;
        padding: 15px;
        border-bottom: 1px solid var(--border-color);
      }

      .message-line {
        margin-bottom: 8px;
        line-height: 1.4;
      }

      .timestamp {
        font-family: 'Courier New', Courier, monospace;
        color: var(--text-secondary);
        font-size: 0.8em; /* Slightly smaller */
        margin-right: 8px;
      }

      .username {
        font-weight: bold;
      }

      .status {
        font-style: italic;
        color: var(--text-secondary);
        line-height: 1.6;
      }

      #form {
        display: flex;
        padding: 15px;
        background-color: var(--background-secondary);
      }

      #messageInput {
        flex-grow: 1;
        padding: 12px;
        border: 2px solid var(--border-color);
        border-radius: 8px;
        background-color: var(--background-primary);
        color: var(--text-primary);
        font-size: 16px;
        transition: border-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
      }

      #messageInput:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 8px rgba(255, 153, 0, 0.5);
      }

      #form button {
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 8px;
        background-color: var(--primary-color);
        color: var(--primary-text);
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        transition: filter 0.2s ease-in-out;
      }

      #form button:hover {
        filter: brightness(0.9);
      }
    </style>
  </head>
  <body>
    <div id="messages">
      <div class="status">Connecting...</div>
    </div>
    <form id="form">
      <input
        type="text"
        id="messageInput"
        autocomplete="off"
        placeholder="Type a message..."
        required
      />
      <button type="submit">Send</button>
    </form>

    <script>
      const username = prompt('Please enter your name:') || 'Anonymous'
      const messagesDiv = document.getElementById('messages')
      const form = document.getElementById('form')
      const messageInput = document.getElementById('messageInput')

      // Array of colors for differentiating users
      const userColors = [
        '#FF6B6B',
        '#4ECDC4',
        '#FED766',
        '#F7B2AD',
        '#45B7D1',
        '#84A59D',
        '#F28482',
        '#90BE6D',
      ]

      // Assigning color for each user
      const userColorMap = new Map()
      let colorIndex = 0

      const getUserColor = (user) => {
        if (!userColorMap.has(user)) {
          const color = userColors[colorIndex]
          userColorMap.set(user, color)
          colorIndex = (colorIndex + 1) % userColors.length
          console.log(userColorMap)
        }
        return userColorMap.get(user)
      }

      const ws = new WebSocket(`ws://${window.location.host}`)

      const addStatusMessage = (content) => {
        const messageElement = document.createElement('div')
        messageElement.classList.add('status')
        messageElement.textContent = content
        messagesDiv.appendChild(messageElement)
        messagesDiv.scrollTop = messagesDiv.scrollHeight
      }

      const addChatMessage = ({ timestamp, username, message }) => {
        const messageLine = document.createElement('div')
        messageLine.classList.add('message-line')

        const timeElement = document.createElement('span')
        timeElement.classList.add('timestamp')
        timeElement.textContent = timestamp

        const userElement = document.createElement('span')
        userElement.classList.add('username')
        userElement.textContent = `${username}: `
        userElement.style.color = getUserColor(username)

        const messageElement = document.createTextNode(message)

        messageLine.appendChild(timeElement)
        messageLine.appendChild(userElement)
        messageLine.appendChild(messageElement)

        messagesDiv.appendChild(messageLine)
        messagesDiv.scrollTop = messagesDiv.scrollHeight
      }

      ws.onopen = () => {
        console.log('Connected to WebSocket server')
        addStatusMessage('Connected to the chat')
      }

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data)

        const timestamp = new Date(data.timestamp).toLocaleTimeString([], {
          hour: '2-digit',
          minute: '2-digit',
        })

        addChatMessage({
          timestamp: `[${timestamp}]`,
          username: data.username,
          message: data.message,
        })
      }

      ws.onclose = () => {
        console.log('Disconnected from WS server')
        addStatusMessage('Disconnected from the chat.')
      }

      ws.onerror = (error) => {
        console.error('Error:', error)
        addStatusMessage('Error connecting to the chat.')
      }

      form.addEventListener('submit', (event) => {
        event.preventDefault()
        const messageText = messageInput.value

        if (messageText) {
          const messageObject = {
            username: username,
            message: messageText,
          }
          ws.send(JSON.stringify(messageObject))
          messageInput.value = ''
        }
      })
    </script>
  </body>
</html>
